# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/diet_health?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 60000

jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-development-only-do-not-use-in-production}
  expiration: 86400000

rate-limit:
  enabled: false

logging:
  level:
    com.diet: DEBUG
    org.springframework.security: DEBUG
